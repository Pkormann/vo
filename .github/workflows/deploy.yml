name: Deploy to Infomaniak

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DEPLOY_PATH: /home/clients/1559dd4581399476a4690d192f620fae/web/vo/

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Vérifier la syntaxe PHP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y php-cli
          find . -name '*.php' -not -path './.git/*' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Configurer la clé SSH
        env:
          INFOMANIAK_KEY:  ${{ secrets.INFOMANIAK_KEY }}
          INFOMANIAK_HOST: ${{ secrets.INFOMANIAK_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$INFOMANIAK_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$INFOMANIAK_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Synchroniser les fichiers
        env:
          INFOMANIAK_HOST: ${{ secrets.INFOMANIAK_HOST }}
          INFOMANIAK_USER: ${{ secrets.INFOMANIAK_USER }}
        # --delete nettoie les fichiers supprimés du dépôt, MAIS rsync protège
        # d'office tout ce qui est --exclude : les chemins ci-dessous survivent à
        # chaque déploiement. Ne jamais ajouter --delete-excluded.
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.gitignore' \
            --exclude='analyse/' \
            --exclude='config/secrets.php' \
            --exclude='data/' \
            --exclude='uploads/' \
            --exclude='*.md' \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ "$INFOMANIAK_USER@$INFOMANIAK_HOST:$DEPLOY_PATH"

      - name: Créer les dossiers persistants
        env:
          INFOMANIAK_HOST: ${{ secrets.INFOMANIAK_HOST }}
          INFOMANIAK_USER: ${{ secrets.INFOMANIAK_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            "$INFOMANIAK_USER@$INFOMANIAK_HOST" \
            "mkdir -p '${DEPLOY_PATH}data' '${DEPLOY_PATH}uploads' && chmod 750 '${DEPLOY_PATH}data' '${DEPLOY_PATH}uploads'"
